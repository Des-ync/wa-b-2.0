<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · WA-B Solutions</title>
<link rel="stylesheet" href="styles.css" />
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_live_Y2xlcmsuc2tlcy50ZWNoJA"
  src="https://clerk.skes.tech/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  type="text/javascript"
></script>
<style>
  .auth-shell {
    min-height: calc(100dvh - 64px);
    display: grid;
    place-items: center;
    padding: clamp(32px, 6vw, 64px) var(--gutter);
  }
  .auth-box { width: 100%; max-width: 420px; }
  .auth-head { text-align: center; margin-bottom: 24px; }
  .auth-head h1 {
    font-size: 28px;
    letter-spacing: -0.025em;
    font-weight: 600;
  }
  .auth-head p { color: var(--muted); font-size: 14.5px; margin: 8px 0 0; }
  /* Clerk mounts its own card; keep our wrapper invisible and centered */
  #clerk-signin { display: grid; justify-content: center; min-height: 380px; }
  .auth-skeleton {
    width: 100%;
    max-width: 400px;
    height: 380px;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: linear-gradient(100deg, var(--bg-2) 40%, var(--paper) 50%, var(--bg-2) 60%);
    background-size: 200% 100%;
  }
  @media (prefers-reduced-motion: no-preference) {
    .auth-skeleton { animation: authShimmer 1.4s linear infinite; }
  }
  @keyframes authShimmer {
    from { background-position: 120% 0; }
    to { background-position: -80% 0; }
  }
  .auth-foot {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    margin-top: 24px;
  }
  .auth-foot a { color: var(--ink); border-bottom: 1px solid var(--line-2); }
  .auth-foot a:hover { border-bottom-color: var(--ink); }
</style>
</head>
<body>
<header class="nav"><div class="wrap nav-row">
  <a href="index.html" class="brand"><span class="brand-mark">W</span><span>WA-B Solutions</span></a>
  <nav><ul class="nav-links"><li><a href="features.html">Features</a></li><li><a href="pricing.html">Pricing</a></li><li><a href="docs.html">Docs</a></li><li><a href="blog.html">Blog</a></li></ul></nav>
  <div class="nav-cta"><a href="signup.html" class="btn btn-primary btn-sm">Start free trial <span class="arr">→</span></a></div>
</div></header>

<main class="auth-shell">
  <div class="auth-box">
    <div class="auth-head">
      <h1>Welcome back.</h1>
      <p>Sign in to manage your shop, orders, and billing.</p>
    </div>

    <div id="clerk-signin"><div class="auth-skeleton" aria-hidden="true"></div></div>

    <p class="auth-foot">New to WA-B? <a href="signup.html">Start your free trial</a></p>
    <p class="auth-foot" style="margin-top:10px">Trouble signing in? <a href="contact.html">Contact support</a></p>
  </div>
</main>

<script src="clerk-theme.js"></script>
<script>
(async () => {
  await waitForClerk();
  await window.Clerk.load();

  // already signed in? straight to the dashboard
  if (window.Clerk.user) {
    window.location.replace('dashboard.html');
    return;
  }

  const el = document.getElementById('clerk-signin');
  el.innerHTML = '';
  window.Clerk.mountSignIn(el, {
    appearance: window.WAB_CLERK_APPEARANCE,
    forceRedirectUrl: 'dashboard.html',
    signUpUrl: 'signup.html'
  });

  // if the user completes sign-in inside the mounted component, move on
  window.Clerk.addListener(({ user }) => {
    if (user) window.location.replace('dashboard.html');
  });
})();
</script>
</body>
</html>

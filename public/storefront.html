<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title><!--OG:TITLE-->Shop · WA-B Solutions</title>
<meta name="description" content="<!--OG:DESCRIPTION-->Browse the catalog and order on WhatsApp." />
<!--OG:TAGS-->
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: var(--bg-2); }
  .store-wrap { max-width: 860px; margin: 0 auto; padding: 0 16px 80px; }
  .store-banner { width: 100%; aspect-ratio: 16/5; object-fit: cover; border-radius: var(--r-lg); margin-top: 16px; background: var(--bg-2); }
  .store-head { text-align: center; padding: 24px 16px 16px; }
  .store-logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid var(--paper); margin: -48px auto 10px; display: block; background: var(--paper); }
  .store-head h1 { font-size: 22px; margin: 0 0 6px; }
  .store-head .muted { color: var(--muted); font-size: 13px; }
  .store-open { display: inline-block; margin-top: 10px; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .open-yes { background: var(--accent-soft); color: var(--accent-ink); }
  .open-no { background: #fbeaea; color: var(--danger); }
  .store-cta { text-align: center; margin: 8px 0 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .store-tools { display: flex; gap: 10px; margin: 0 0 18px; flex-wrap: wrap; align-items: center; }
  .store-search { flex: 1; min-width: 160px; padding: 9px 12px; border: 1px solid var(--line); border-radius: var(--r-md); font-size: 14px; }
  .cat-chip { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line); font-size: 12px; cursor: pointer; background: var(--paper); white-space: nowrap; }
  .cat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cat-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .store-section-title { font-size: 14px; font-weight: 700; margin: 22px 0 10px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); }
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .prod-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .prod-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: var(--bg-2); }
  .prod-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .prod-name { font-weight: 600; font-size: 14px; }
  .prod-desc { color: var(--muted); font-size: 12px; flex: 1; }
  .prod-cat { color: var(--muted-2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  .prod-price { font-weight: 700; font-size: 15px; margin-top: 4px; }
  .prod-featured { font-size: 11px; color: var(--accent-ink); font-weight: 600; }
  .prod-oos { font-size: 11px; color: var(--danger); font-weight: 600; }
  .prod-actions { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .qty-row { display: flex; align-items: center; gap: 8px; }
  .qty-row button { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--line); background: var(--paper); cursor: pointer; }
  .err-box, .loading-box, .empty-box { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper); border-top: 1px solid var(--line);
    padding: 12px 16px; display: none; align-items: center; justify-content: space-between; gap: 12px; z-index: 40;
  }
  .cart-bar.show { display: flex; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--paper); border-radius: var(--r-lg); max-width: 440px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 20px; }
  .modal-card h3 { margin: 0 0 14px; }
  .cart-line { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .cart-line-name { font-size: 13px; font-weight: 600; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; padding: 9px 10px; border: 1px solid var(--line); border-radius: var(--r-md); font-size: 14px; box-sizing: border-box; }
  .upsell-chip { font-size: 12px; background: var(--accent-soft); color: var(--accent-ink); border-radius: var(--r-md); padding: 8px 10px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<header class="nav"><div class="wrap nav-row">
  <a href="index.html" class="brand"><img class="brand-logo brand-logo-light" src="assets/logo-light.jpg" alt="WA-B Solutions" /><img class="brand-logo brand-logo-dark" src="assets/logo-dark.jpg" alt="WA-B Solutions" /></a>
</div></header>

<div class="store-wrap">
  <div id="loading" class="loading-box">Loading shop…</div>
  <div id="error" class="err-box" style="display:none"></div>
  <div id="content" style="display:none">
    <img id="banner" class="store-banner" style="display:none" alt="" />
    <div id="head" class="store-head"></div>
    <div class="store-cta">
      <a id="chatBtn" class="btn btn-primary" href="#" target="_blank" rel="noopener">💬 Start an order on WhatsApp</a>
      <button id="cartTopBtn" class="btn btn-ghost" style="display:none" onclick="openCart()">🛒 View cart</button>
    </div>
    <div class="store-tools">
      <input id="search" class="store-search" type="text" placeholder="Search products…" oninput="renderProducts()" />
    </div>
    <div id="catRow" class="cat-row" style="display:none"></div>

    <div id="bundlesWrap" style="display:none">
      <div class="store-section-title">Bundles &amp; combos</div>
      <div id="bundleGrid" class="store-grid"></div>
    </div>

    <div class="store-section-title">Products</div>
    <div id="grid" class="store-grid"></div>
    <div id="empty" class="empty-box" style="display:none">No products listed yet — check back soon.</div>
  </div>
</div>

<div id="cartBar" class="cart-bar">
  <div><strong id="cartCount">0</strong> item(s) · <span id="cartTotal">GH¢0.00</span></div>
  <button class="btn btn-primary btn-sm" onclick="openCart()">Checkout</button>
</div>

<div id="cartModal" class="modal-overlay" onclick="if(event.target===this) closeCart()">
  <div class="modal-card">
    <h3>Your cart</h3>
    <div id="cartLines"></div>
    <div id="cartEmptyMsg" class="muted" style="padding:14px 0">Your cart is empty.</div>
    <div style="margin-top:14px">
      <div class="field"><label>Your name</label><input id="custName" type="text" placeholder="e.g. Ama Mensah" /></div>
      <div class="field"><label>WhatsApp / phone number</label><input id="custPhone" type="tel" placeholder="024xxxxxxx" /></div>
      <div class="field"><label>Delivery address (optional)</label><textarea id="custAddress" rows="2" placeholder="Leave blank for pickup"></textarea></div>
    </div>
    <div id="checkoutError" class="muted" style="color:var(--danger); display:none; margin-bottom:10px"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeCart()">Close</button>
      <button id="checkoutBtn" class="btn btn-primary" onclick="submitCheckout()">Place order</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="modal-overlay" onclick="if(event.target===this) closeConfirm()">
  <div class="modal-card" style="text-align:center">
    <h3>Order placed 🎉</h3>
    <p class="muted" id="confirmText"></p>
    <a id="confirmWaBtn" class="btn btn-primary" href="#" target="_blank" rel="noopener">Continue &amp; pay on WhatsApp</a>
  </div>
</div>

<script>
function money(n) {
  return 'GH¢' + Number(n || 0).toFixed(2);
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

let SLUG = '';
let SHOP = null;
let PRODUCTS = [];
let BUNDLES = [];
let ACTIVE_CATEGORY = '';
const CART_KEY = () => 'wab_cart_' + SLUG;

function loadCart() {
  try { return JSON.parse(localStorage.getItem(CART_KEY()) || '[]'); } catch (e) { return []; }
}
function saveCart(cart) {
  localStorage.setItem(CART_KEY(), JSON.stringify(cart));
  renderCartBar();
}
function addToCart(kind, id, name, price) {
  const cart = loadCart();
  const existing = cart.find(l => l.kind === kind && l.id === id);
  if (existing) existing.quantity += 1;
  else cart.push({ kind, id, name, price, quantity: 1 });
  saveCart(cart);
  if (kind === 'product') maybeShowUpsell(id);
}
function changeQty(kind, id, delta) {
  let cart = loadCart();
  const line = cart.find(l => l.kind === kind && l.id === id);
  if (!line) return;
  line.quantity += delta;
  if (line.quantity <= 0) cart = cart.filter(l => !(l.kind === kind && l.id === id));
  saveCart(cart);
  renderCartLines();
}
function cartTotalGhs() {
  return loadCart().reduce((sum, l) => sum + Number(l.price) * l.quantity, 0);
}
function renderCartBar() {
  const cart = loadCart();
  const count = cart.reduce((s, l) => s + l.quantity, 0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = money(cartTotalGhs());
  document.getElementById('cartBar').classList.toggle('show', count > 0);
  document.getElementById('cartTopBtn').style.display = count > 0 ? 'inline-flex' : 'none';
}

async function maybeShowUpsell(productId) {
  try {
    const res = await fetch('/api/storefront/' + encodeURIComponent(SLUG) + '/upsell?product_id=' + encodeURIComponent(productId));
    const data = await res.json();
    if (data.success && data.suggestion) {
      const chip = document.getElementById('upsell-' + productId);
      if (chip) {
        chip.style.display = 'block';
        chip.textContent = '+ Frequently bought with ' + data.suggestion.name + ' — add it?';
        chip.onclick = () => addToCart('product', data.suggestion.id, data.suggestion.name, data.suggestion.price_ghs);
      }
    }
  } catch (e) { /* best-effort only */ }
}

function openCart() {
  renderCartLines();
  document.getElementById('cartModal').classList.add('show');
}
function closeCart() { document.getElementById('cartModal').classList.remove('show'); }
function closeConfirm() { document.getElementById('confirmModal').classList.remove('show'); }

function renderCartLines() {
  const cart = loadCart();
  const wrap = document.getElementById('cartLines');
  document.getElementById('cartEmptyMsg').style.display = cart.length ? 'none' : 'block';
  wrap.innerHTML = cart.map(l => `
    <div class="cart-line">
      <div class="cart-line-name">${esc(l.name)}<div class="muted">${money(l.price)} each</div></div>
      <div class="qty-row">
        <button onclick="changeQty('${l.kind}','${l.id}',-1)">−</button>
        <span>${l.quantity}</span>
        <button onclick="changeQty('${l.kind}','${l.id}',1)">+</button>
      </div>
    </div>
  `).join('');
}

async function submitCheckout() {
  const cart = loadCart();
  const errEl = document.getElementById('checkoutError');
  errEl.style.display = 'none';
  if (!cart.length) { errEl.textContent = 'Your cart is empty.'; errEl.style.display = 'block'; return; }
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  if (!name || !phone) { errEl.textContent = 'Name and phone number are required.'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.textContent = 'Placing order…';
  try {
    const res = await fetch('/api/storefront/' + encodeURIComponent(SLUG) + '/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer_name: name,
        customer_phone: phone,
        delivery_address: address || undefined,
        items: cart.filter(l => l.kind === 'product').map(l => ({ product_id: l.id, quantity: l.quantity })),
        bundles: cart.filter(l => l.kind === 'bundle').map(l => ({ bundle_id: l.id, quantity: l.quantity }))
      })
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Could not place order');

    localStorage.removeItem(CART_KEY());
    renderCartBar();
    closeCart();
    document.getElementById('confirmText').textContent =
      'Order #' + data.order.order_number + ' · ' + money(data.order.total_ghs) + '. Tap below to finish payment on WhatsApp.';
    const waBtn = document.getElementById('confirmWaBtn');
    if (data.whatsapp_link) { waBtn.href = data.whatsapp_link; waBtn.style.display = 'inline-flex'; }
    else waBtn.style.display = 'none';
    document.getElementById('confirmModal').classList.add('show');
  } catch (err) {
    errEl.textContent = err.message || 'Could not place order.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Place order';
  }
}

function renderCategories() {
  const cats = Array.isArray(SHOP.categories) ? SHOP.categories : [];
  const row = document.getElementById('catRow');
  if (!cats.length) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  row.innerHTML = ['All'].concat(cats).map(c => {
    const active = (c === 'All' && !ACTIVE_CATEGORY) || c === ACTIVE_CATEGORY;
    return `<div class="cat-chip ${active ? 'active' : ''}" onclick="setCategory('${c === 'All' ? '' : esc(c).replace(/'/g, "\\'")}')">${esc(c)}</div>`;
  }).join('');
}
function setCategory(c) { ACTIVE_CATEGORY = c; renderCategories(); renderProducts(); }

function productCard(p, digits) {
  return `
    <div class="prod-card">
      ${p.image_url ? `<img class="prod-img" src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy" decoding="async" onerror="this.style.display='none'" />` : ''}
      <div class="prod-body">
        <div class="prod-cat">${esc(p.category)}</div>
        <div class="prod-name">${esc(p.name)}</div>
        ${p.description ? `<div class="prod-desc">${esc(p.description)}</div>` : ''}
        <div class="prod-price">${money(p.price_ghs)}</div>
        ${p.featured ? '<div class="prod-featured">★ Featured</div>' : ''}
        ${!p.in_stock ? '<div class="prod-oos">Out of stock</div>' : ''}
        <div class="prod-actions">
          ${p.in_stock ? `<button class="btn btn-primary btn-xs" onclick="addToCart('product','${p.id}',${JSON.stringify(p.name)}.toString(),${p.price_ghs})">Add to cart</button>` : ''}
          ${digits ? `<a class="btn btn-ghost btn-xs" href="https://wa.me/${digits}?text=${encodeURIComponent('Hi ' + SHOP.name + ', I would like to order: ' + p.name)}" target="_blank" rel="noopener">Order on WhatsApp</a>` : ''}
        </div>
        <div class="upsell-chip" id="upsell-${p.id}"></div>
      </div>
    </div>
  `;
}

function renderProducts() {
  const digits = String(SHOP.whatsapp_number || '').replace(/[^\d]/g, '');
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  let list = PRODUCTS;
  if (ACTIVE_CATEGORY) list = list.filter(p => p.category === ACTIVE_CATEGORY);
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));

  const gridEl = document.getElementById('grid');
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  gridEl.innerHTML = list.map(p => productCard(p, digits)).join('');
}

function renderBundles() {
  const wrap = document.getElementById('bundlesWrap');
  if (!BUNDLES.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('bundleGrid').innerHTML = BUNDLES.map(b => `
    <div class="prod-card">
      ${b.image_url ? `<img class="prod-img" src="${esc(b.image_url)}" alt="${esc(b.name)}" loading="lazy" decoding="async" onerror="this.style.display='none'" />` : ''}
      <div class="prod-body">
        <div class="prod-cat">Bundle</div>
        <div class="prod-name">${esc(b.name)}</div>
        <div class="prod-desc">${(b.items || []).map(i => esc(i.quantity + '× ' + i.name)).join(', ')}</div>
        <div class="prod-price">${money(b.price_ghs)}</div>
        <div class="prod-actions">
          <button class="btn btn-primary btn-xs" onclick="addToCart('bundle','${b.id}',${JSON.stringify(b.name)}.toString(),${b.price_ghs})">Add to cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function loadStore() {
  const params = new URLSearchParams(window.location.search);
  SLUG = params.get('shop');
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const contentEl = document.getElementById('content');

  if (!SLUG) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = 'No shop specified. Check the link and try again.';
    return;
  }

  try {
    const res = await fetch('/api/storefront/' + encodeURIComponent(SLUG));
    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.error || 'Shop not found');
    }
    SHOP = data.shop;
    SHOP.categories = data.categories || [];
    PRODUCTS = Array.isArray(data.products) ? data.products : [];
    BUNDLES = Array.isArray(data.bundles) ? data.bundles : [];

    document.title = esc(SHOP.name) + ' · WA-B Solutions';
    if (SHOP.banner_url) {
      const bannerEl = document.getElementById('banner');
      bannerEl.src = SHOP.banner_url;
      bannerEl.style.display = 'block';
    }
    document.getElementById('head').innerHTML = `
      ${SHOP.logo_url ? `<img class="store-logo" src="${esc(SHOP.logo_url)}" alt="" onerror="this.style.display='none'" />` : ''}
      <h1>${esc(SHOP.name)}</h1>
      ${SHOP.welcome_message ? `<div class="muted">${esc(SHOP.welcome_message)}</div>` : ''}
      <span class="store-open ${SHOP.open_now ? 'open-yes' : 'open-no'}">${SHOP.open_now ? 'Open now' : 'Currently closed'}</span>
    `;

    const digits = String(SHOP.whatsapp_number || '').replace(/[^\d]/g, '');
    const chatBtn = document.getElementById('chatBtn');
    if (digits) {
      chatBtn.href = 'https://wa.me/' + digits + '?text=' + encodeURIComponent('Hi ' + SHOP.name + ', I would like to order');
    } else {
      chatBtn.style.display = 'none';
    }

    renderCategories();
    renderBundles();
    renderProducts();
    renderCartBar();

    loadingEl.style.display = 'none';
    contentEl.style.display = 'block';
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = err.message || 'Could not load this shop.';
  }
}

loadStore();
</script>

</body>
</html>

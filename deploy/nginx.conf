# /etc/nginx/sites-available/wa-saas -> symlink into sites-enabled
# Reverse proxy for the Node app on the Oracle Cloud app VM.
# After copying this into place, run: sudo certbot --nginx -d yourdomain.me
# Certbot will rewrite the server block to add the 443/ssl_certificate lines.

server {
    listen 80;
    listen [::]:80;
    server_name skes.tech www.skes.tech;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Webhook endpoints need the raw body forwarded untouched — no special
    # handling needed here since Nginx proxies the raw request body by default.
    client_max_body_size 2m;
}

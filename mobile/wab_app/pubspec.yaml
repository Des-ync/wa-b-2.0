name: wab_app
description: WA-B — WhatsApp commerce dashboard for merchants and the WA-B team.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  smooth_page_indicator: ^1.2.0
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^7.3.0
  mobile_scanner: ^7.4.0
  speech_to_text: ^7.4.0
  local_auth: ^3.0.2
  flutter_web_auth_2: ^5.0.3
  passkeys: ^2.22.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

# Generated via `dart run flutter_launcher_icons` — source art in
# assets/icon/. Re-run that command any time icon.png/icon_foreground.png
# change; it overwrites every platform size, nothing here is hand-edited.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FAF6ED"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
